name: Production Deployment

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build Code
        run: echo "Building the application..."

  # New staging deployment stage
  deploy-to-staging:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Staging
        run: echo "Deploying application to staging..."

  deploy-to-prod:
    runs-on: ubuntu-latest
    # Changed from 'build' to 'staging' so it waits for staging to finish first
    needs: deploy-to-staging
    environment:
      name: production
      # This shows the link in the GitHub UI
      url: https://myapp.com 
    steps:
      - name: Deploy to Production
        run: echo "Deploying application to production..."
